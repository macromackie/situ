[tools]
bun = "1.3.14"
typos = "1.46.1"
actionlint = "1.7.12"

[tasks.update]
description = "Install dependencies and refresh the lockfile"
run = "bun install"

[tasks.format]
description = "Format the repository"
run = "bun x oxfmt . --write"

[tasks."format:check"]
description = "Check repository formatting"
run = "bun x oxfmt . --check"

[tasks.lint]
description = "Lint TypeScript"
run = "bun x oxlint . --deny-warnings --report-unused-disable-directives"

[tasks."adrs:check"]
description = "Validate active ADR metadata"
run = "bun scripts/check_adrs.ts"

[tasks.markdownlint]
description = "Lint Markdown"
run = "bun x markdownlint-cli2"

[tasks.typos]
description = "Check spelling"
run = "typos --force-exclude"

[tasks.actionlint]
description = "Lint GitHub Actions workflow YAML"
run = "actionlint"

[tasks.fallow]
description = "Check unused code and dependency graph policy"
run = "bun x fallow check --config fallow.config.json"

[tasks."fallow:audit"]
description = "Audit changed files for dead code, duplication, and complexity"
run = "bash scripts/fallow-audit.sh"

[tasks."fallow:fix"]
description = "Apply Fallow auto-fixes"
run = "bun x fallow fix --config fallow.config.json"

[tasks."fallow:baseline"]
description = "Refresh Fallow analysis baselines"
run = [
  "bun x fallow dead-code --config fallow.config.json --save-baseline .fallow/dead-code-baseline.json",
  "bun x fallow health --config fallow.config.json --save-baseline .fallow/health-baseline.json",
  "bun x fallow dupes --config fallow.config.json --save-baseline .fallow/dupes-baseline.json",
]

[tasks.typecheck]
description = "Typecheck every workspace source and test file"
run = "bun x tsgo --noEmit -p tsconfig.json"

[tasks.test]
description = "Run Bun tests"
run = "bun test"

[tasks.coverage]
description = "Run tests with coverage"
run = "scripts/coverage.sh"

[tasks.evals]
description = "Run real LLM evals"
run = "cd projects/evals && mise run evals"

[tasks."e2e-tests"]
description = "Run deterministic e2e tests"
run = "cd projects/e2e-tests && mise run test"

[tasks.check]
description = "Run the full non-mutating local gate"
run = [
  "mise run format:check",
  "mise run lint",
  "mise run adrs:check",
  "mise run markdownlint",
  "mise run typos",
  "mise run actionlint",
  "mise run fallow",
  "mise run typecheck",
  "mise run test",
]

[tasks."app:check"]
run = "cd projects/app && mise run check"

[tasks."app:typecheck"]
run = "cd projects/app && mise run typecheck"

[tasks."app:test"]
